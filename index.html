  <title>SF Sunsetters </title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #1e2a4a;
      --bg-card-hover: #253560;
      --text-primary: #f0e6d3;
      --text-secondary: #b8a990;
      --text-dim: #7a7060;
      --border: #2a3a5e;
      --spectacular: #C42828;
      --beautiful: #E8580C;
      --decent: #D4891A;
      --muted: #A07828;
      --skipit: #555E3B;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 30%, #4a1942 50%, #8b2f2f 70%, #c44b1a 85%, #d4891a 100%);
      padding: 24px 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .header p {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ===== DAY SWITCHER ===== */
    .day-switcher {
      display: flex;
      gap: 8px;
      padding: 16px;
      justify-content: center;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .day-btn {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .day-btn:hover { background: var(--bg-card); color: var(--text-primary); }
    .day-btn.active {
      background: linear-gradient(135deg, #c44b1a, #E8580C);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(232,88,12,0.3);
    }

    /* ===== SUNSET TIME ===== */
    .sunset-time {
      text-align: center;
      padding: 12px 16px 14px;
      background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(232,88,12,0.06) 100%);
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      border-bottom: 1px solid rgba(232,88,12,0.15);
    }
    .sunset-time .countdown {
      color: var(--beautiful);
      font-weight: 700;
      font-size: 20px;
      display: block;
      margin-top: 2px;
    }
    .sunset-time .time-label {
      font-size: 13px;
      opacity: 0.7;
    }

    /* ===== MAP CONTAINER ===== */
    .map-section {
      padding: 16px;
      position: relative;
    }
    .map-container {
      position: relative;
      max-width: 540px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      background: #0f1528;
      border: 1px solid var(--border);
    }
    .map-container svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .neighborhood-poly {
      stroke: #0a0f1e;
      stroke-width: 2;
      cursor: pointer;
      transition: opacity 0.15s ease, stroke-width 0.15s ease;
    }
    .neighborhood-poly:hover {
      opacity: 0.85;
      stroke-width: 3;
      stroke: #fff;
    }
    .neighborhood-poly.selected {
      stroke-width: 3;
      stroke: #fff;
    }
    .map-label {
      pointer-events: none;
      user-select: none;
    }
    .map-label-name {
      fill: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 600;
      text-anchor: middle;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .map-label-score {
      fill: #fff;
      font-size: 16px;
      font-weight: 800;
      text-anchor: middle;
    }
    .park-label {
      fill: rgba(100,180,100,0.6);
      font-size: 10px;
      font-weight: 600;
      text-anchor: middle;
      letter-spacing: 3px;
      pointer-events: none;
    }
    .park-strip {
      fill: rgba(60,120,60,0.25);
      pointer-events: none;
    }
    .water-fill { fill: #0c1220; }
    .bridge-line {
      stroke: #c44b1a;
      stroke-width: 2.5;
      stroke-dasharray: 6 3;
      opacity: 0.6;
    }

    /* ===== TOOLTIP ===== */
    .tooltip {
      position: fixed;
      z-index: 1000;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .tooltip-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .tooltip-rating {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .tooltip-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
    }
    .tooltip-detail {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }
    .tooltip-detail-label { color: var(--text-secondary); }
    .tooltip-detail-value { font-weight: 600; }
    .tooltip-score {
      font-size: 28px;
      font-weight: 800;
      float: right;
      line-height: 1;
      margin-top: -2px;
    }

    /* ===== LEGEND ===== */
    .legend {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px 0;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* ===== RANKED LIST ===== */
    .ranked-section {
      padding: 20px 16px 32px;
      max-width: 540px;
      margin: 0 auto;
    }
    .ranked-header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      padding-left: 4px;
    }
    .ranked-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .ranked-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .ranked-card:hover {
      background: var(--bg-card-hover);
      border-color: #3a4a6e;
    }
    .ranked-rank {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
      margin-right: 8px;
      min-width: 18px;
    }
    .ranked-info { flex: 1; min-width: 0; }
    .ranked-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ranked-rating {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .ranked-score {
      font-size: 22px;
      font-weight: 800;
      margin-left: 8px;
    }
    .ranked-emoji {
      font-size: 16px;
      margin-left: 4px;
    }

    /* ===== LOADING ===== */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,21,40,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      z-index: 100;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--beautiful);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .error-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,21,40,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      z-index: 100;
      padding: 24px;
      text-align: center;
    }
    .error-overlay.hidden { display: none; }
    .error-icon { font-size: 32px; margin-bottom: 12px; }
    .error-msg { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
    .retry-btn {
      margin-top: 16px;
      padding: 10px 24px;
      background: var(--beautiful);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--text-secondary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 400px) {
      .header h1 { font-size: 22px; }
      .day-btn { padding: 8px 14px; font-size: 13px; }
      .ranked-grid { gap: 8px; }
      .ranked-card { padding: 10px 12px; }
      .ranked-score { font-size: 18px; }
      .map-label-name { font-size: 9px; }
      .map-label-score { font-size: 13px; }
    }
    @media (min-width: 768px) {
      .header h1 { font-size: 34px; }
      .map-section { padding: 24px; }
      .ranked-section { max-width: 600px; }
    }
  </style>
</head>

// ==========================================
// SCORING
// ==========================================

function getSunsetHour() {
  // Fallback if API astronomy data is unavailable
  const month = new Date().getMonth() + 1;
  if (month >= 11 || month <= 2) return 17;
  if (month >= 3 && month <= 5) return 19;
  if (month >= 6 && month <= 8) return 20;
  return 18;
}

function parseSunsetHour(astronomyArr) {
  if (!astronomyArr?.[0]?.sunset) return null;
  const match = astronomyArr[0].sunset.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!match) return null;
  let hour = parseInt(match[1], 10);
  if (match[3].toUpperCase() === "PM" && hour !== 12) hour += 12;
  if (match[3].toUpperCase() === "AM" && hour === 12) hour = 0;
  return hour;
}

function getSeasonalFogMultiplier() {
  const month = new Date().getMonth() + 1;
  const fogByMonth = [0.3, 0.3, 0.5, 0.6, 0.8, 1.0, 1.0, 0.9, 0.7, 0.4, 0.3, 0.3];
  return fogByMonth[month - 1];
}

function calculateScore(raw) {
  // Cloud cover (max 35 pts) — sweet spot around 40-50%, tails off smoothly
  const cc = raw.cloud_cover;
  const ccIdeal = 45;
  const ccScore = 35 * Math.max(0, 1 - Math.pow((cc - ccIdeal) / 50, 2));

  // Cloud altitude (max 25 pts) — high clouds are best, low clouds worst
  const highBonus = Math.min(25, raw.cloud_cover_high * 0.8);
  const lowPenalty = Math.min(20, raw.cloud_cover_low * 0.5);
  const altScore = Math.max(0, highBonus - lowPenalty + raw.cloud_cover_mid * 0.15);

  // Low cloud penalty — heavy fog/marine layer tanks the score beyond altitude
  const lowCloudPenalty = Math.min(15, Math.max(0, raw.cloud_cover_low - 40) * 0.25);

  // Visibility (max 20 pts) — peaks at 6-9 mi, drops for very low or very high
  const visMi = raw.visibility / 1609.34;
  const visScore = 20 * Math.max(0, 1 - Math.pow((visMi - 7.5) / 9.3, 2));

  // Humidity (max 5 pts) — ideal around 50-60%
  const hum = raw.relative_humidity_2m;
  const humScore = 5 * Math.max(0, 1 - Math.pow((hum - 55) / 45, 2));

  // Horizon view bonus (max 15 pts) — from geographic factors
  const horizonScore = (raw.horizon_view || 0) * 15;

  const total = ccScore + Math.min(25, altScore) + visScore + humScore + horizonScore - lowCloudPenalty;
  return Math.round(Math.min(100, Math.max(0, total)));
}

function getRating(score) {
  return RATINGS.find(r => score >= r.min && score <= r.max) || RATINGS[RATINGS.length - 1];
}

  marina:         { fogExposure: 0.5,  elevation: 0.15, horizonView: 0.80 },

  soma:           { fogExposure: 0.05, elevation: 0.05, horizonView: 0.15 },

async function fetchCityWeather() {
  const resp = await fetch("https://wttr.in/San+Francisco,CA?format=j1");
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return await resp.json();
}

function blendEntries(target, prev, fields) {
  // 60% sunset slot, 40% preceding slot for smoother transitions
  const result = {};
  for (const f of fields) {
    const t = parseInt(target[f], 10) || 0;
    const p = parseInt(prev[f], 10) || 0;
    result[f] = Math.round(t * 0.6 + p * 0.4);
  }
  return result;
}

function extractDayData(apiData) {
  const weatherDays = apiData.weather || [];
  const days = [];
  sunsetTimes = [];

  for (const day of weatherDays) {
    const hourly = day.hourly || [];
    // Capture raw sunset time string from API
    const rawSunset = day.astronomy?.[0]?.sunset?.trim() || null;
    sunsetTimes.push(rawSunset);

    // Use actual sunset time from astronomy data, fall back to seasonal estimate
    const sunsetHour = parseSunsetHour(day.astronomy) || getSunsetHour();
    const targetTime = String(Math.round(sunsetHour / 3) * 300);

    // Find target slot and preceding slot for blending
    const targetIdx = hourly.findIndex(h => h.time === targetTime);
    const idx = targetIdx >= 0 ? targetIdx : hourly.length - 1;
    const prevIdx = Math.max(0, idx - 1);
    const target = hourly[idx];
    const prev = hourly[prevIdx];

    if (target) {
      const blended = blendEntries(target, prev,
        ["cloudcover", "visibility", "humidity", "windspeedKmph", "winddirDegree"]);
      const fogChance = Math.round(
        parseInt(target.chanceoffog, 10) * 0.6 + parseInt(prev.chanceoffog, 10) * 0.4) || 0;
      const sunChance = Math.round(
        parseInt(target.chanceofsunshine, 10) * 0.6 + parseInt(prev.chanceofsunshine, 10) * 0.4) || 0;

      const cc = blended.cloudcover;
      const vis = blended.visibility;

      // Infer cloud altitude from fog/sunshine/visibility signals
      const lowFromFog = fogChance * 0.8;
      const lowFromVis = vis < 5 ? (5 - vis) * 10 : 0;
      const cloud_cover_low = Math.min(100, Math.round(lowFromFog + lowFromVis));

      const sunFraction = sunChance / 100;
      const cloud_cover_mid = Math.min(100, Math.round(cc * (1 - sunFraction) * 0.5));

      // High thin clouds: cloudcover present but fog-free with some sunshine
      const highFromCoverage = cc * sunFraction * 0.8;
      const highBonus = (cc > 20 && fogChance < 20) ? 15 : 0;
      const cloud_cover_high = Math.min(100, Math.round(highFromCoverage + highBonus));

      days.push({
        cloud_cover: cc,
        cloud_cover_low,
        cloud_cover_mid,
        cloud_cover_high,
        visibility: vis * 1000,
        relative_humidity_2m: blended.humidity,
        wind_speed: blended.windspeedKmph,
        wind_dir: blended.winddirDegree,
        date: day.date || "N/A"
      });
    }
    if (days.length === 3) break;
  }

  while (days.length < 3) {
    days.push({ cloud_cover: 50, cloud_cover_low: 10, cloud_cover_mid: 15, cloud_cover_high: 25, visibility: 15000, relative_humidity_2m: 55, wind_speed: 10, wind_dir: 270, date: "N/A" });
  }

  return days;
}

function adjustRawForNeighborhood(baseRaw, id) {
  const geo = GEO_FACTORS[id] || { fogExposure: 0.3, elevation: 0.3, horizonView: 0.4 };
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // Wind-based fog modifier: westerly winds push marine layer inland
  const windDir = baseRaw.wind_dir || 270;
  const windSpeed = baseRaw.wind_speed || 10;
  const isWesterly = windDir >= 210 && windDir <= 330;
  const windFogMultiplier = isWesterly
    ? Math.min(1.5, 1 + windSpeed / 40)
    : Math.max(0.3, 1 - windSpeed / 50);

  // Seasonal fog: Jun-Aug heavy, Oct-Feb minimal
  const seasonalFog = getSeasonalFogMultiplier();

  const effectiveFog = geo.fogExposure * seasonalFog * windFogMultiplier;
  const fogEffect = effectiveFog * 35;
  const elevEffect = geo.elevation * 25;

  return {
    cloud_cover: clamp(Math.round(baseRaw.cloud_cover + fogEffect - elevEffect * 0.5), 0, 100),
    cloud_cover_low: clamp(Math.round(baseRaw.cloud_cover_low + fogEffect * 2 - elevEffect), 0, 100),
    cloud_cover_mid: clamp(Math.round(baseRaw.cloud_cover_mid + fogEffect * 0.3), 0, 100),
    cloud_cover_high: baseRaw.cloud_cover_high,
    visibility: clamp(Math.round(baseRaw.visibility * (1 - effectiveFog * 0.4 + geo.elevation * 0.25)), 1000, 100000),
    relative_humidity_2m: clamp(Math.round(baseRaw.relative_humidity_2m + fogEffect - elevEffect * 0.4), 0, 100),
    horizon_view: geo.horizonView,
    date: baseRaw.date
  };
}

async function fetchAllData() {
  try {
    const apiData = await fetchCityWeather();
    const baseDays = extractDayData(apiData);

    for (const id of Object.keys(NEIGHBORHOODS)) {
      const days = baseDays.map(baseRaw => {
        const raw = adjustRawForNeighborhood(baseRaw, id);
        const score = calculateScore(raw);
        return { score, rating: getRating(score), raw };
      });
      weatherCache[id] = { days };
    }

    return { total: Object.keys(NEIGHBORHOODS).length, failed: 0 };
  } catch (err) {
    console.error("Weather fetch failed:", err);
    for (const id of Object.keys(NEIGHBORHOODS)) {
      weatherCache[id] = {
        days: [0, 1, 2].map(() => ({
          score: 45,
          rating: getRating(45),
          raw: { cloud_cover: 50, cloud_cover_low: 10, cloud_cover_mid: 15, cloud_cover_high: 25, visibility: 15000, relative_humidity_2m: 55, date: "N/A" }
        }))
      };
    }
    return { total: Object.keys(NEIGHBORHOODS).length, failed: Object.keys(NEIGHBORHOODS).length };
  }
}

  bridge.setAttribute("x2", "150.3");

  bridge.classList.add("bridge-line");
  svg.appendChild(bridge);

  // Peninsula outline stroke
  const outline = document.createElementNS("http://www.w3.org/2000/svg", "path");
  outline.setAttribute("d", SF_OUTLINE);
  outline.setAttribute("fill", "none");
  outline.setAttribute("stroke", "#2a3a5e");
  outline.setAttribute("stroke-width", "2");
  svg.appendChild(outline);

  // Labels group (on top of everything)
  const labelsGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
  labelsGroup.id = "labels-group";
  labelsGroup.setAttribute("filter", "url(#text-shadow)");

  for (const [id, n] of Object.entries(NEIGHBORHOODS)) {
    const c = { x: n.centroid.x, y: n.centroid.y };

    const nameEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    nameEl.setAttribute("x", c.x);
    nameEl.setAttribute("y", c.y - 8);

    scoreEl.textContent = "--";

    labelsGroup.appendChild(nameEl);
    labelsGroup.appendChild(scoreEl);
  }

  svg.appendChild(labelsGroup);

  return svg;
}

let sunsetCountdownInterval = null;

function parseSunsetTime(timeStr, dayOffset) {
  // Parse "07:39 PM" into a Date object for the given day
  const match = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!match) return null;
  let hours = parseInt(match[1], 10);
  const minutes = parseInt(match[2], 10);
  const period = match[3].toUpperCase();
  if (period === "PM" && hours !== 12) hours += 12;
  if (period === "AM" && hours === 12) hours = 0;
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  d.setHours(hours, minutes, 0, 0);
  return d;
}

function formatCountdown(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function updateSunsetTime() {
  const el = document.getElementById("sunsetTime");
  const time = sunsetTimes[currentDay];
  if (sunsetCountdownInterval) {
    clearInterval(sunsetCountdownInterval);
    sunsetCountdownInterval = null;
  }
  if (!time) { el.textContent = ""; return; }

  if (currentDay === 0) {
    // Tonight — show live countdown
    const renderCountdown = () => {
      const sunsetDate = parseSunsetTime(time, 0);
      if (!sunsetDate) { el.innerHTML = `Sunset at <span class="countdown">${time}</span>`; return; }
      const diff = sunsetDate - new Date();
      if (diff > 0) {
        el.innerHTML = `<span class="time-label">Sunset in</span><span class="countdown">${formatCountdown(diff)}</span><span class="time-label">at ${time}</span>`;
      } else {
        el.innerHTML = `<span class="time-label">Sunset was at</span><span class="countdown">${time}</span>`;
      }
    };
    renderCountdown();
    sunsetCountdownInterval = setInterval(renderCountdown, 1000);
  } else {
    // Future days — static display
    const dayLabel = currentDay === 1 ? "Tomorrow" : "In 2 days";
    el.innerHTML = `<span class="time-label">${dayLabel} at</span><span class="countdown">${time}</span>`;
  }
}

function updateMap() {
  const polys = document.querySelectorAll(".neighborhood-poly");
  for (const poly of polys) {
    const id = poly.getAttribute("data-id");
    const dayData = weatherCache[id]?.days[currentDay];
    if (dayData) {
      poly.setAttribute("fill", dayData.rating.color);
    }
  }

  // Update score labels
  for (const id of Object.keys(NEIGHBORHOODS)) {
    const el = document.querySelector(`[data-score-id="${id}"]`);
    if (el) {
      const dayData = weatherCache[id]?.days[currentDay];
      el.textContent = dayData ? dayData.score : "--";
    }
  }
}

function updateRankedList() {
  const grid = document.getElementById("rankedGrid");
  const header = document.getElementById("rankedHeader");

  header.textContent = `Top Sunsets ${DAY_LABELS[currentDay]}`;

  // Sort neighborhoods by score descending
  const sorted = Object.keys(NEIGHBORHOODS)
    .map(id => ({
      id,
      name: NEIGHBORHOODS[id].name,
      ...(weatherCache[id]?.days[currentDay] || { score: 0, rating: getRating(0) })
    }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  grid.innerHTML = sorted.map((item, i) => `
    <div class="ranked-card" data-id="${item.id}">
      <span class="ranked-rank">${i + 1}</span>
      <div class="ranked-info">
        <div class="ranked-name">${item.name}</div>
        <div class="ranked-rating" style="color:${item.rating.color}">${item.rating.label}</div>
      </div>
      <span class="ranked-score" style="color:${item.rating.color}">${item.score}</span>
      <span class="ranked-emoji">${item.rating.emoji}</span>
    </div>
  `).join("");

  // Add click handlers
  grid.querySelectorAll(".ranked-card").forEach(card => {
    card.addEventListener("click", (e) => {
      const id = card.getAttribute("data-id");
      showTooltipForNeighborhood(id, card);
    });
  });
}

function buildLegend() {
  const legend = document.getElementById("legend");
  legend.innerHTML = RATINGS.map(r => `
    <div class="legend-item">
      <div class="legend-swatch" style="background:${r.color}"></div>
      <span>${r.label} ${r.emoji}</span>
    </div>
  `).join("");
}

// ==========================================
// TOOLTIP
// ==========================================

function showTooltipForNeighborhood(id, anchorEl) {
  const n = NEIGHBORHOODS[id];
  const dayData = weatherCache[id]?.days[currentDay];
  if (!n || !dayData) return;

  selectedNeighborhood = id;

  // Highlight polygon
  document.querySelectorAll(".neighborhood-poly").forEach(p => p.classList.remove("selected"));
  const poly = document.querySelector(`.neighborhood-poly[data-id="${id}"]`);
  if (poly) poly.classList.add("selected");

  const tooltip = document.getElementById("tooltip");
  const raw = dayData.raw;
  const visMi = (raw.visibility / 1609.34).toFixed(1);

  tooltip.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="tooltip-name">${n.name}</div>
        <div class="tooltip-rating" style="color:${dayData.rating.color}">${dayData.rating.label} ${dayData.rating.emoji}</div>
      </div>
      <div class="tooltip-score" style="color:${dayData.rating.color}">${dayData.score}</div>
    </div>
    <div class="tooltip-details">
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">Cloud cover</span>
        <span class="tooltip-detail-value">${raw.cloud_cover}%</span>
      </div>
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">High clouds</span>
        <span class="tooltip-detail-value">${raw.cloud_cover_high}%</span>
      </div>
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">Mid clouds</span>
        <span class="tooltip-detail-value">${raw.cloud_cover_mid}%</span>
      </div>
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">Low clouds</span>
        <span class="tooltip-detail-value">${raw.cloud_cover_low}%</span>
      </div>
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">Visibility</span>
        <span class="tooltip-detail-value">${visMi} mi</span>
      </div>
      <div class="tooltip-detail">
        <span class="tooltip-detail-label">Humidity</span>
        <span class="tooltip-detail-value">${raw.relative_humidity_2m}%</span>
      </div>
    </div>
  `;

  // Position tooltip
  positionTooltip(anchorEl);
  tooltip.classList.add("visible");
}

function positionTooltip(anchorEl) {
  const tooltip = document.getElementById("tooltip");
  const rect = anchorEl.getBoundingClientRect ? anchorEl.getBoundingClientRect() : null;

  if (!rect) {
    tooltip.style.left = "50%";
    tooltip.style.top = "50%";
    tooltip.style.transform = "translate(-50%, -50%)";
    return;
  }

  const tooltipWidth = 220;
  const tooltipHeight = 180;
  const pad = 12;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = rect.left + rect.width / 2 - tooltipWidth / 2;
  let top = rect.top - tooltipHeight - pad;

  // If tooltip goes above viewport, show below
  if (top < pad) {
    top = rect.bottom + pad;
  }

  // Clamp horizontal
  if (left < pad) left = pad;
  if (left + tooltipWidth > vw - pad) left = vw - tooltipWidth - pad;

  // Clamp vertical
  if (top + tooltipHeight > vh - pad) {
    top = rect.top - tooltipHeight - pad;
    if (top < pad) top = pad;
  }

  tooltip.style.left = left + "px";
  tooltip.style.top = top + "px";
  tooltip.style.transform = "none";
}

function hideTooltip() {
  const tooltip = document.getElementById("tooltip");
  tooltip.classList.remove("visible");
  document.querySelectorAll(".neighborhood-poly").forEach(p => p.classList.remove("selected"));
  selectedNeighborhood = null;
}

// ==========================================
// EVENT HANDLERS
// ==========================================

function setupEvents() {
  // Day switcher
  document.querySelectorAll(".day-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const day = parseInt(btn.getAttribute("data-day"), 10);
      currentDay = day;
      document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      hideTooltip();
      updateMap();
      updateRankedList();
      updateSunsetTime();
    });
  });

  // Map interactions
  const mapContainer = document.getElementById("mapContainer");

  // Polygon click/tap
  mapContainer.addEventListener("click", (e) => {
    const poly = e.target.closest(".neighborhood-poly");
    if (poly) {
      const id = poly.getAttribute("data-id");
      if (selectedNeighborhood === id) {
        hideTooltip();
      } else {
        showTooltipForNeighborhood(id, poly);
      }
      e.stopPropagation();
      return;
    }
    // Click outside polygon hides tooltip
    hideTooltip();
  });

  // Desktop hover
  if (!("ontouchstart" in window)) {
    mapContainer.addEventListener("mouseover", (e) => {
      const poly = e.target.closest(".neighborhood-poly");
      if (poly) {
        const id = poly.getAttribute("data-id");
        showTooltipForNeighborhood(id, poly);
      }
    });
    mapContainer.addEventListener("mouseout", (e) => {
      const poly = e.target.closest(".neighborhood-poly");
      if (poly) {
        const related = e.relatedTarget;
        if (!related || !related.closest?.(".neighborhood-poly")) {
          hideTooltip();
        }
      }
    });
  }

  // Close tooltip on scroll (mobile)
  window.addEventListener("scroll", () => {
    if (selectedNeighborhood) hideTooltip();
  }, { passive: true });

  // Close tooltip on outside touch
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".map-container") && !e.target.closest(".tooltip") && !e.target.closest(".ranked-card")) {
      hideTooltip();
    }
  });
}

// ==========================================
// LOADING / ERROR
// ==========================================

function showLoading() {
  document.getElementById("loadingOverlay").classList.remove("hidden");
  document.getElementById("errorOverlay").classList.add("hidden");
}

function hideLoading() {
  document.getElementById("loadingOverlay").classList.add("hidden");
}

function showError(msg) {
  hideLoading();
  document.getElementById("errorMsg").textContent = msg;
  document.getElementById("errorOverlay").classList.remove("hidden");
}

// ==========================================
// INIT
// ==========================================

async function init() {
  showLoading();

  // Build and insert SVG
  const container = document.getElementById("mapContainer");
  const existingSvg = container.querySelector("svg");
  if (existingSvg) existingSvg.remove();
  const svg = buildSVG();
  container.appendChild(svg);

  // Build legend
  buildLegend();

  // Setup events
  setupEvents();

  // Fetch data
  try {
    const result = await fetchAllData();

    if (result.failed === result.total) {
      showError("Could not load weather data for any neighborhood. Check your connection and try again.");
      return;
    }

    hideLoading();
    updateMap();
    updateRankedList();
    updateSunsetTime();

    if (result.failed > 0) {
      console.warn(`${result.failed}/${result.total} neighborhood fetches failed, using fallback scores.`);
    }
  } catch (err) {
    showError("An unexpected error occurred. Please try again.");
    console.error(err);
  }

  // Auto-refresh every 30 minutes
  setInterval(refreshData, 30 * 60 * 1000);

  // Refresh when tab regains focus (if stale > 10 min)
  let lastFetch = Date.now();
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && Date.now() - lastFetch > 10 * 60 * 1000) {
      refreshData();
    }
  });

  async function refreshData() {
    try {
      const result = await fetchAllData();
      if (result.failed < result.total) {
        lastFetch = Date.now();
        updateMap();
        updateRankedList();
        updateSunsetTime();
        if (selectedNeighborhood) {
          const poly = document.querySelector(`.neighborhood-poly[data-id="${selectedNeighborhood}"]`);
          if (poly) showTooltipForNeighborhood(selectedNeighborhood, poly);
        }
      }
    } catch (e) {
      console.warn("Auto-refresh failed:", e);
    }
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
